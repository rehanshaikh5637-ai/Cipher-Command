<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeartSINT — Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1628;--navy2:#0f1f3d;--blue:#1a56db;--blue2:#1e429f;
  --accent:#00d4ff;--accent2:#0ea5e9;--success:#10b981;--warning:#f59e0b;
  --danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --card:rgba(15,31,61,0.8);--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--navy);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(26,86,219,0.15) 0%,transparent 60%),linear-gradient(180deg,#0a1628 0%,#060e1e 100%);}


/* LOGIN OVERLAY */
#login-overlay{position:fixed;inset:0;background:#020810;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;pointer-events:all;transition:opacity 0.5s ease;}
#login-overlay::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
#login-overlay::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 40% at 50% 50%,rgba(0,80,255,0.07) 0%,transparent 70%);pointer-events:none;}
#login-overlay.fade-out{opacity:0;pointer-events:none;}
.login-box{position:relative;z-index:10;width:360px;max-width:92vw;display:flex;flex-direction:column;align-items:center;}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.login-heart{width:48px;height:48px;margin-bottom:12px;animation:logo-beat 1.4s ease-in-out infinite;}
@keyframes logo-beat{0%{transform:scale(1);}14%{transform:scale(1.1);}28%{transform:scale(1);}42%{transform:scale(1.07);}56%,100%{transform:scale(1);}}
.login-brand{font-family:var(--mono);font-size:22px;font-weight:500;letter-spacing:4px;color:#fff;margin-bottom:4px;}
.login-brand span{color:#00d4ff;}
.login-tagline{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:#2a4060;text-transform:uppercase;}
.login-card{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(0,212,255,0.12);border-radius:10px;padding:28px;}
.login-card-title{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:#3a5470;text-transform:uppercase;margin-bottom:20px;text-align:center;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:#3a5470;text-transform:uppercase;margin-bottom:6px;}
.login-field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(0,212,255,0.15);border-radius:6px;padding:10px 14px;color:#b8d4f0;font-family:var(--mono);font-size:13px;outline:none;transition:border-color 0.2s;letter-spacing:1px;}
.login-field input:focus{border-color:rgba(0,212,255,0.5);}
.login-field input::placeholder{color:#2a4060;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#3a5470;line-height:0;z-index:10;}
.login-error{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:#ef4444;text-align:center;margin-bottom:12px;min-height:16px;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.login-btn{width:100%;background:linear-gradient(90deg,#0a4bff,#00d4ff);border:none;border-radius:6px;padding:11px;color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:3px;cursor:pointer;transition:opacity 0.2s;}
.login-btn:hover{opacity:0.85;}
.login-stamp{position:absolute;bottom:18px;right:20px;font-family:var(--mono);font-size:9px;letter-spacing:3px;color:rgba(255,60,60,0.5);border:1px solid rgba(255,60,60,0.2);padding:3px 8px;transform:rotate(-0.6deg);}

/* LOADING OVERLAY */
#loading-overlay{position:fixed;inset:0;background:#020810;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;pointer-events:all;transition:opacity 0.6s ease;}
#loading-overlay::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
#loading-overlay::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 40% at 50% 50%,rgba(0,80,255,0.07) 0%,transparent 70%);pointer-events:none;}
#loading-overlay.fade-out{opacity:0;pointer-events:none;}
.ld-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;}
.ld-heart-wrap{position:relative;margin-bottom:32px;}
.ld-heart-icon{width:64px;height:64px;animation:logo-beat 1.4s ease-in-out infinite;}
.ld-pulse-ring{position:absolute;inset:-14px;border-radius:50%;border:1.5px solid rgba(0,212,255,0.25);animation:ld-pulse 1.4s ease-out infinite;}
.ld-pulse-ring:nth-child(2){animation-delay:0.4s;}
@keyframes ld-pulse{0%{transform:scale(0.8);opacity:0.6;}100%{transform:scale(1.6);opacity:0;}}
.ld-brand{font-family:var(--mono);font-size:28px;font-weight:500;letter-spacing:6px;color:#fff;margin-bottom:6px;}
.ld-brand span{color:#00d4ff;}
.ld-tagline{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:#3a5470;margin-bottom:48px;text-transform:uppercase;}
.ld-bar-wrap{width:260px;margin-bottom:16px;}
.ld-bar-track{width:100%;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.ld-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#0a4bff,#00d4ff);border-radius:2px;}
.ld-status{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:#2a4060;animation:ld-blink 1s step-end infinite;}
@keyframes ld-blink{0%,100%{opacity:0.6;}50%{opacity:0.2;}}
.ld-stamp{position:absolute;bottom:20px;right:22px;font-family:var(--mono);font-size:9px;letter-spacing:3px;color:rgba(255,60,60,0.5);border:1px solid rgba(255,60,60,0.2);padding:3px 8px;transform:rotate(-0.6deg);}

</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <svg class="login-heart" viewBox="0 0 64 64" fill="none">
        <path d="M32 54S6 38 6 20a14 14 0 0 1 26-7.1A14 14 0 0 1 58 20c0 18-26 34-26 34z" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="14,30 20,30 23,24 26,36 29,28 32,32 35,26 38,30 50,30" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      </svg>
      <div class="login-brand">Heart<span>SINT</span></div>
      <div class="login-tagline">Heart of OSINT Intelligence</div>
    </div>
    <div class="login-card">
      <div class="login-card-title">Operator Authentication</div>
      <div class="login-field">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter username" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="login-field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-pass" placeholder="Enter password" style="padding-right:42px;"/>
          <button class="eye-btn" onclick="togglePw()" type="button" id="eye-btn">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    </div>
  </div>
  <div class="login-stamp">LEA RESTRICTED</div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="ld-container">
    <div class="ld-heart-wrap">
      <div class="ld-pulse-ring"></div>
      <div class="ld-pulse-ring"></div>
      <svg class="ld-heart-icon" viewBox="0 0 64 64" fill="none">
        <path d="M32 54S6 38 6 20a14 14 0 0 1 26-7.1A14 14 0 0 1 58 20c0 18-26 34-26 34z" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>
        <polyline points="14,30 20,30 23,24 26,36 29,28 32,32 35,26 38,30 50,30" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </svg>
    </div>
    <div class="ld-brand">Heart<span>SINT</span></div>
    <div class="ld-tagline">Intelligence Platform</div>
    <div class="ld-bar-wrap"><div class="ld-bar-track"><div class="ld-bar-fill" id="ld-bar-fill"></div></div></div>
    <div class="ld-status">LOADING...</div>
  </div>
  <div class="ld-stamp">LEA RESTRICTED</div>
</div>

<script>
// ── LOGIN ──
let loginAttempts=0;
const LOGIN_MAX=3;
let loginLockedUntil=0;

function togglePw(){
  const inp=document.getElementById('login-pass');
  const icon=document.getElementById('eye-icon');
  if(inp.type==='password'){inp.type='text';document.getElementById('eye-btn').style.color='#00d4ff';icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{inp.type='password';document.getElementById('eye-btn').style.color='#3a5470';icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}

function doLogin(){
  const err=document.getElementById('login-error');
  // Check lockout
  if(loginLockedUntil>Date.now()){
    const s=Math.ceil((loginLockedUntil-Date.now())/1000);
    err.textContent='Account locked. Try again in '+s+' seconds.';
    return;
  }
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  if(user==='heartbeat'&&pass==='welovetohack'){
    loginAttempts=0;loginLockedUntil=0;err.textContent='';
    const loginEl=document.getElementById('login-overlay');
    const loadEl=document.getElementById('loading-overlay');
    const bar=document.getElementById('ld-bar-fill');
    bar.style.width='0%';bar.style.transition='none';
    loginEl.classList.add('fade-out');
    setTimeout(()=>{
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        bar.style.transition='width 5000ms linear';bar.style.width='100%';
      }));
      setTimeout(()=>{
        loadEl.classList.add('fade-out');
        setTimeout(()=>window.location.href='heartsint-18.html', 500);
      },5000);
    },500);
  } else {
    loginAttempts++;
    document.getElementById('login-pass').value='';
    if(loginAttempts>=LOGIN_MAX){
      loginLockedUntil=Date.now()+30000;
      document.getElementById('login-user').disabled=true;
      document.getElementById('login-pass').disabled=true;
      err.textContent='Too many failed attempts. Locked for 30 seconds.';
      err.style.animation='none';err.offsetHeight;err.style.animation='shake 0.4s ease';
      const t=setInterval(()=>{
        const s=Math.ceil((loginLockedUntil-Date.now())/1000);
        if(s<=0){
          clearInterval(t);loginAttempts=0;
          document.getElementById('login-user').disabled=false;
          document.getElementById('login-pass').disabled=false;
          err.textContent='Lockout expired. You may try again.';
        } else {
          err.textContent='Account locked. Try again in '+s+' seconds.';
        }
      },1000);
    } else {
      const rem=LOGIN_MAX-loginAttempts;
      err.textContent='Invalid credentials. '+rem+' attempt'+(rem>1?'s':'')+' remaining.';
      err.style.animation='none';err.offsetHeight;err.style.animation='shake 0.4s ease';
      document.getElementById('login-pass').focus();
    }
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){const l=document.getElementById('login-overlay');if(l.style.opacity!=='0'&&!l.classList.contains('fade-out'))doLogin();}});
setTimeout(()=>document.getElementById('login-user').focus(),100);

</script>
</body>
</html>
